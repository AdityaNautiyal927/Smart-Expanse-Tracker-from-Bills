version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./expenses.db
      - OCR_ENGINE=easyocr
      - CATEGORIZATION_ENGINE=rule_based
      - ENABLE_ASYNC_PROCESSING=false
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./uploads:/app/uploads
      - ./models:/app/models
      - ./expenses.db:/app/expenses.db
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

